server:
  address: ${SERVER_ADDRESS:127.0.0.1}
  servlet:
    encoding:
      charset: UTF-8
      force: true
  port: 8082

spring:
  application:
    name: product-service
  main:
    banner-mode: off
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/biyesheji?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_ROOT_PASSWORD:}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 300000
      connection-timeout: 10000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  flyway:
    baseline-on-migrate: true
    baseline-version: 0

media:
  storage-path: ${MEDIA_STORAGE_PATH:/data/media}
  max-bytes: ${MEDIA_MAX_BYTES:5242880}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

knife4j:
  enable: true
  openapi:
    title: 商品服务 API
    description: 商品查询、搜索、筛选

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  structured:
    format:
      console: ${LOG_STRUCTURED_FORMAT:ecs}
  level:
    root: WARN
    com.biyesheji: INFO
