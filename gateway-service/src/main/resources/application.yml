server:
  address: ${SERVER_ADDRESS:127.0.0.1}
  servlet:
    encoding:
      charset: UTF-8
      force: true
  port: 8080

spring:
  application:
    name: gateway-service
  main:
    banner-mode: off
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: ai-service
          uri: lb://order-service
          predicates:
            - Path=/api/order/ai/**
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/product/**,/api/merchant/products/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**,/api/merchant/initialize,/api/merchant/store/**,/api/merchant/staff/**,/api/store/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/order/**,/api/merchant/orders/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - ${CORS_ALLOWED_ORIGIN_PATTERN:http://localhost:5173}
            allowedMethods: [GET, POST, PUT, DELETE, OPTIONS]
            allowedHeaders: [Authorization, Content-Type]
            allowCredentials: true

jwt:
  secret: ${JWT_SECRET:}
  access-token-expire: 7200
  refresh-token-expire: 604800

sentinel:
  qps:
    order: 100
    product: 500
    ai: 5

logging:
  level:
    root: WARN
    com.biyesheji: INFO
