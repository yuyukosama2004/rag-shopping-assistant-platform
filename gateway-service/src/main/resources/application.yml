server:
  address: ${SERVER_ADDRESS:127.0.0.1}
  servlet:
    encoding:
      charset: UTF-8
      force: true
  port: 8080

spring:
  application:
    name: gateway-service
  main:
    banner-mode: off
  cloud:
    gateway:
      routes:
        - id: ai-service
          uri: ${ORDER_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/order/ai/**
        - id: product-service
          uri: ${PRODUCT_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/product/**,/api/media/**,/api/merchant/products/**,/api/merchant/media/**,/api/merchant/catalog/**
        - id: user-service
          uri: ${USER_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/user/**,/api/merchant/initialize,/api/merchant/store/**,/api/merchant/staff/**,/api/store/**
        - id: order-service
          uri: ${ORDER_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/order/**,/api/shipping-rules/**,/api/merchant/orders/**,/api/merchant/shipping-rules/**,/api/merchant/refunds/**,/api/merchant/ai/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - ${CORS_ALLOWED_ORIGIN_PATTERN:http://localhost:5173}
            allowedMethods: [GET, POST, PUT, DELETE, OPTIONS]
            allowedHeaders: [Authorization, Content-Type]
            allowCredentials: true

jwt:
  secret: ${JWT_SECRET:}
  access-token-expire: 7200
  refresh-token-expire: 604800

sentinel:
  qps:
    order: 100
    product: 500
    ai: 5

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  structured:
    format:
      console: ${LOG_STRUCTURED_FORMAT:ecs}
  level:
    root: WARN
    com.biyesheji: INFO
