services:
  mysql:
    image: mysql:8.0
    container_name: biyesheji-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: biyesheji
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - ../sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ../sql/mock_data.sql:/docker-entrypoint-initdb.d/02-mock.sql
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: biyesheji-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: biyesheji-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: biyesheji-nacos
    restart: unless-stopped
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    volumes:
      - nacos-data:/home/nacos/data

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  nacos-data:
