# PhoneMall E5 2680V4 高配版基础设施
# 比旧笔记本版提高: MySQL 2GB / Redis 256MB / Nacos 1GB

services:
  mysql:
    image: mysql:8.0.46
    container_name: biyesheji-mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: biyesheji
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --innodb_buffer_pool_size=512M
      - --innodb_log_file_size=64M
      - --max_connections=100
      - --performance_schema=OFF
      - --skip-log-bin
    volumes:
      - ../sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ../sql/mock_data.sql:/docker-entrypoint-initdb.d/02-mock.sql
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=\"$$MYSQL_ROOT_PASSWORD\" mysqladmin ping -h 127.0.0.1 -uroot --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    mem_limit: 2048M
    networks: [internal]

  redis:
    image: redis:7.4.9-alpine
    container_name: biyesheji-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
    command: ["sh", "-c", "exec redis-server --requirepass \"$$REDIS_PASSWORD\" --maxmemory 256mb --maxmemory-policy allkeys-lru --save \"\""]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep -qx PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    mem_limit: 256M
    networks: [internal]

  nacos:
    image: nacos/nacos-server:v2.5.2
    container_name: biyesheji-nacos
    restart: unless-stopped
    ports:
      - "127.0.0.1:8848:8848"
      - "127.0.0.1:9848:9848"
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      JVM_XMS: 256m
      JVM_XMX: 1024m
      JVM_XMN: 128m
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8848/nacos/ > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 45s
    mem_limit: 1024M
    networks: [internal]

volumes:
  mysql-data:
  redis-data:
  nacos-data:

networks:
  internal:
    name: biyesheji-internal
