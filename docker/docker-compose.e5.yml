# PhoneMall E5 2680V4 高配版基础设施
# 比旧笔记本版提高: MySQL 2GB / Redis 256MB / RabbitMQ 768MB / Nacos 1GB

services:
  mysql:
    image: mysql:8.0
    container_name: biyesheji-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: biyesheji
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --innodb_buffer_pool_size=512M
      - --innodb_log_file_size=64M
      - --max_connections=100
      - --performance_schema=OFF
      - --skip-log-bin
    volumes:
      - ../sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ../sql/mock_data.sql:/docker-entrypoint-initdb.d/02-mock.sql
      - mysql-data:/var/lib/mysql
    mem_limit: 2048M

  redis:
    image: redis:7-alpine
    container_name: biyesheji-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redis-data:/data
    mem_limit: 256M

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: biyesheji-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    mem_limit: 768M

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: biyesheji-nacos
    restart: unless-stopped
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      JVM_XMS: 256m
      JVM_XMX: 1024m
      JVM_XMN: 128m
    volumes:
      - nacos-data:/home/nacos/data
    mem_limit: 1024M

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  nacos-data:
