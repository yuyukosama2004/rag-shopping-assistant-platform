# ============================================================
# 阿里云服务器 frps 配置
# 部署到 frp 目录下的 frps.toml
# 确保已安装 frp_0.54.0_linux_amd64
# ============================================================

bindPort = 7000

# 云服务器安全组需开放端口:
#   7000 (frps)
#   80   (nginx HTTP)
#   443  (nginx HTTPS — 可选)
#   6000 (SSH 隧道 — 已在 frpc 中配置)
#   6080 (Web 隧道)
