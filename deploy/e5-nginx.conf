# ============================================================
# PhoneMall E5 服务器 nginx 配置
# 部署到 /etc/nginx/conf.d/biyesheji.conf
# ============================================================

server {
    listen 80;
    server_name _;

    # Vue 前端静态文件
    root /home/jill/project/biyesheji/biyesheji-frontend/dist;
    index index.html;

    # API 请求转发到 Spring Cloud Gateway
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 前端图片静态资源
    location /images/ {
        alias /home/jill/project/biyesheji/biyesheji-frontend/dist/images/;
        expires 7d;
    }

    # Vue Router SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
