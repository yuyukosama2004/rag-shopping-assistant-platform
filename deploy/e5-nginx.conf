# ============================================================
# PhoneMall nginx 配置（部署时自动替换路径）
# 部署到 /etc/nginx/conf.d/biyesheji.conf
# ============================================================

server {
    listen 80;
    server_name _;

    root PROJECT_DIR/biyesheji-frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:GATEWAY_HOST_PORT;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering off;                          # SSE 必须关缓冲
        proxy_cache off;                              # 不缓存
    }

    location /images/ {
        alias PROJECT_DIR/biyesheji-frontend/dist/images/;
        expires 7d;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
