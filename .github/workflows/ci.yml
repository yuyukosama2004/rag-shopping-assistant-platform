name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Verify backend
        run: ./mvnw -B verify

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: biyesheji-frontend/package-lock.json
      - name: Install dependencies
        working-directory: biyesheji-frontend
        run: npm ci
      - name: Run frontend unit and API mock tests
        working-directory: biyesheji-frontend
        run: npm run test:unit
      - name: Build frontend
        working-directory: biyesheji-frontend
        run: npm run build
      - name: Audit dependencies
        working-directory: biyesheji-frontend
        run: npm audit --audit-level=high

  full-stack-e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: biyesheji-frontend/package-lock.json
      - name: Prepare isolated E2E environment
        run: |
          cp .env.example .env
          sed -i 's|^OWNER_INIT_TOKEN=.*|OWNER_INIT_TOKEN=ci-owner-initialization-token|' .env
          sed -i 's|^JWT_SECRET=.*|JWT_SECRET=ci-jwt-secret-that-is-at-least-thirty-two-bytes|' .env
          sed -i 's|^GATEWAY_HOST_PORT=.*|GATEWAY_HOST_PORT=18080|' .env
          sed -i 's|^CORS_ALLOWED_ORIGIN_PATTERN=.*|CORS_ALLOWED_ORIGIN_PATTERN=http://127.0.0.1:4173|' .env
      - name: Start infrastructure
        run: docker compose --env-file .env -f docker/docker-compose.infrastructure.yml up -d --wait --wait-timeout 180
      - name: Build and start application services
        run: |
          ./mvnw -B package -DskipTests
          APP_IMAGE_TAG=e2e docker compose --env-file .env -f docker/docker-compose.app.yml build
          APP_IMAGE_TAG=e2e docker compose --env-file .env -f docker/docker-compose.app.yml up -d --wait --wait-timeout 180
          for attempt in $(seq 1 60); do
            curl --fail --silent 'http://127.0.0.1:18080/api/product/page?pageNum=1&pageSize=1' >/dev/null && exit 0
            sleep 2
          done
          exit 1
      - name: Install browser test dependencies
        working-directory: biyesheji-frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Build and start frontend
        working-directory: biyesheji-frontend
        env:
          VITE_API_BASE_URL: http://127.0.0.1:18080
        run: |
          npm run build
          npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/biyesheji-frontend.log 2>&1 &
          for attempt in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 1
          done
          exit 1
      - name: Run merchant-to-customer Playwright flow
        working-directory: biyesheji-frontend
        env:
          E2E_API_URL: http://127.0.0.1:18080
          E2E_FRONTEND_URL: http://127.0.0.1:4173
          E2E_OWNER_INIT_TOKEN: ci-owner-initialization-token
          E2E_JWT_SECRET: ci-jwt-secret-that-is-at-least-thirty-two-bytes
        run: npm run test:e2e
      - name: Run dependency and service recovery drills
        run: bash scripts/ci-fault-drill.sh
      - name: Print service logs after failure
        if: failure()
        run: docker compose --env-file .env -f docker/docker-compose.app.yml logs --no-color --tail 200
      - name: Remove E2E environment
        if: always()
        run: |
          docker compose --env-file .env -f docker/docker-compose.app.yml down -v || true
          docker compose --env-file .env -f docker/docker-compose.infrastructure.yml down -v || true
          rm -f .env

  configuration:
    runs-on: ubuntu-latest
    env:
      MYSQL_ROOT_PASSWORD: ci-mysql-password
      REDIS_PASSWORD: ci-redis-password
      JWT_SECRET: ci-jwt-secret-that-is-at-least-thirty-two-bytes
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate Compose files
        run: |
          cp .env.example .env
          trap 'rm -f .env' EXIT
          docker compose --env-file .env -f docker/docker-compose.infrastructure.yml config -q
          docker compose --env-file .env -f docker/docker-compose.e5.yml config -q
          docker compose --env-file .env -f docker/docker-compose.app.yml config -q
          docker compose --env-file .env -f docker/docker-compose.observability.yml config -q
      - name: Validate shell syntax
        run: bash -n start.sh deploy/e5-deploy.sh deploy/e5-ctl.sh deploy/setup-tls.sh scripts/smoke-test.sh scripts/data-maintenance.sh scripts/release-maintenance.sh scripts/ci-fault-drill.sh
      - name: Validate Nginx syntax template
        run: |
          sed -e "s|PROJECT_DIR|/opt/biyesheji|g" -e "s|GATEWAY_HOST_PORT|18080|g" deploy/e5-nginx.conf > /tmp/biyesheji.conf
          docker run --rm -v /tmp/biyesheji.conf:/etc/nginx/conf.d/default.conf:ro nginx:1.28.0-alpine nginx -t
      - name: Validate production TLS Nginx template
        run: |
          mkdir -p /tmp/nginx-certs/live/shop.example.com
          openssl req -x509 -nodes -newkey rsa:2048 -days 1 -subj '/CN=shop.example.com' \
            -keyout /tmp/nginx-certs/live/shop.example.com/privkey.pem \
            -out /tmp/nginx-certs/live/shop.example.com/fullchain.pem >/dev/null 2>&1
          sed -e 's|DOMAIN|shop.example.com|g' -e 's|PROJECT_DIR|/srv/biyesheji|g' \
              -e 's|GATEWAY_HOST_PORT|18080|g' deploy/production-nginx.conf.template > /tmp/production.conf
          docker run --rm \
            -v /tmp/production.conf:/etc/nginx/conf.d/default.conf:ro \
            -v "$PWD/deploy/biyesheji-proxy-headers.conf:/etc/nginx/conf.d/biyesheji-proxy-headers.conf:ro" \
            -v /tmp/nginx-certs:/etc/letsencrypt:ro nginx:1.28.0-alpine nginx -t
      - name: Validate observability configuration
        run: |
          docker run --rm \
            -v "$PWD/deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro" \
            -v "$PWD/deploy/observability/alerts.yml:/etc/prometheus/alerts.yml:ro" \
            --entrypoint /bin/promtool \
            prom/prometheus:v3.13.1 \
            check config /etc/prometheus/prometheus.yml
          docker run --rm \
            -v "$PWD/deploy/observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro" \
            --entrypoint /bin/amtool \
            prom/alertmanager:v0.33.1 \
            check-config /etc/alertmanager/alertmanager.yml

  source-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Scan Git history for leaked secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
      - name: Scan source, dependencies, and configuration
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scan-ref: .
          version: v0.69.3
          scanners: vuln,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

  image-security:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Package backend images
        run: |
          ./mvnw -B package -DskipTests
          cp .env.example .env
          trap 'rm -f .env' EXIT
          APP_IMAGE_TAG=ci docker compose --env-file .env -f docker/docker-compose.app.yml build
      - name: Scan user service image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: biyesheji-user-service:ci
          version: v0.69.3
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
      - name: Scan product service image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: biyesheji-product-service:ci
          version: v0.69.3
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
      - name: Scan order service image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: biyesheji-order-service:ci
          version: v0.69.3
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
      - name: Scan gateway service image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: biyesheji-gateway-service:ci
          version: v0.69.3
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

  observability-image-security:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: prometheus
            image: prom/prometheus:v3.13.1
          - component: alertmanager
            image: prom/alertmanager:v0.33.1
            trivyignores: .trivyignore-alertmanager.yaml
          - component: node-exporter
            image: prom/node-exporter:v1.12.1
          - component: cadvisor
            image: ghcr.io/google/cadvisor:v0.60.5
    name: observability-image-security (${{ matrix.component }})
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Scan ${{ matrix.component }} image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ matrix.image }}
          version: v0.69.3
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: ${{ matrix.trivyignores }}
          exit-code: 1

  infrastructure-image-security:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: mysql
            image: mysql:8.0.46
          - component: redis
            image: redis:7.4.9-alpine
          - component: nacos
            image: nacos/nacos-server:v2.5.2
          - component: nginx
            image: nginx:1.28.0-alpine
    name: infrastructure-image-security (${{ matrix.component }})
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Scan ${{ matrix.component }} image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ matrix.image }}
          version: v0.69.3
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
