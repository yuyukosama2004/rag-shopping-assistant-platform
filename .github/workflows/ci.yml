name: CI

on:
  push:
    branches: [main, 'codex/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Verify backend
        run: ./mvnw -B verify

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: biyesheji-frontend/package-lock.json
      - name: Install dependencies
        working-directory: biyesheji-frontend
        run: npm ci
      - name: Build frontend
        working-directory: biyesheji-frontend
        run: npm run build
      - name: Audit dependencies
        working-directory: biyesheji-frontend
        run: npm audit --audit-level=high

  configuration:
    runs-on: ubuntu-latest
    env:
      MYSQL_ROOT_PASSWORD: ci-mysql-password
      REDIS_PASSWORD: ci-redis-password
      JWT_SECRET: ci-jwt-secret-that-is-at-least-thirty-two-bytes
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose files
        run: |
          docker compose -f docker/docker-compose.infrastructure.yml config -q
          docker compose -f docker/docker-compose.e5.yml config -q
      - name: Validate shell syntax
        run: bash -n start.sh deploy/e5-deploy.sh deploy/e5-ctl.sh
      - name: Validate Nginx syntax template
        run: |
          sed "s|PROJECT_DIR|/opt/biyesheji|g" deploy/e5-nginx.conf > /tmp/biyesheji.conf
          docker run --rm -v /tmp/biyesheji.conf:/etc/nginx/conf.d/default.conf:ro nginx:1.27-alpine nginx -t
