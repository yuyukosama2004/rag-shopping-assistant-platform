name: Nightly AI Evaluation

on:
  schedule:
    - cron: '17 18 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-evaluation:
    if: vars.PHONEMALL_NIGHTLY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run live protected evaluation
        env:
          GIT_SHA: ${{ github.sha }}
          PHONEMALL_BASE_URL: ${{ secrets.PHONEMALL_BASE_URL }}
          PHONEMALL_MERCHANT_TOKEN: ${{ secrets.PHONEMALL_MERCHANT_TOKEN }}
        run: python3 -m evals.eval42 --config evals/config/phonemall.live.json
      - name: Upload nightly evaluation reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: eval42-nightly-${{ github.sha }}
          path: evals/reports/
          if-no-files-found: ignore
          retention-days: 30
