server:
  servlet:
    encoding:
      charset: UTF-8
      force: true
  port: 8081

spring:
  application:
    name: user-service
  main:
    banner-mode: off
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/biyesheji?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 300000
      connection-timeout: 10000
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

knife4j:
  enable: true
  openapi:
    title: 用户服务 API
    description: 注册、登录、用户信息、地址管理

logging:
  level:
    root: WARN
    com.biyesheji: INFO

jwt:
  secret: biyesheji-2026-spring-cloud-microservice-phone-mall-platform-secret-key
  access-token-expire: 7200
  refresh-token-expire: 604800
