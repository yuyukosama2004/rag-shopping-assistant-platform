server:
  servlet:
    encoding:
      charset: UTF-8
      force: true
  port: 8083

spring:
  application:
    name: order-service
  main:
    banner-mode: off
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/biyesheji?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 300000
      connection-timeout: 10000
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin123
    listener:
      simple:
        concurrency: 2
        max-concurrency: 3
        prefetch: 5
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

knife4j:
  enable: true
  openapi:
    title: 订单服务 API
    description: 购物车、下单、订单管理、AI导购

logging:
  level:
    root: WARN
    com.biyesheji: INFO

jwt:
  secret: biyesheji-2026-spring-cloud-microservice-phone-mall-platform-secret-key
  access-token-expire: 7200
  refresh-token-expire: 604800

openrouter:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: https://api.deepseek.com/v1
  model: deepseek-v4-flash

